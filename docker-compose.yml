No problem — you don't need the git command line for this. GitHub lets you fork and edit files entirely in the browser. Here's the whole thing click-by-click.

1. Get a GitHub account (skip if you already have one) — sign up free at github.com.

2. Fork the repo
Go to https://github.com/brian7704/OpenTAKServer-Docker, click Fork (top right), confirm. You now have your own copy at github.com/<your-username>/OpenTAKServer-Docker.

3. Edit docker-compose.yml in the browser
In your fork, click docker-compose.yml, then the pencil icon (top right of the file view) to edit. Select all the existing text and delete it, then paste the full replacement below — it's the original with nginx-proxy and certbot removed and the NPM network added.
