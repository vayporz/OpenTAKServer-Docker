so here's another wrinkle. npm is running in docker on another physical server in the homelab, not in docker on this server. are there other changes that will need to be made
Reconfigured cross-host networking architecture and port exposure strategy

Yes — that changes things meaningfully. Docker bridge networks (which is what external: true was attaching to) only exist within a single Docker host. Two separate physical machines can't share one that way without setting up Docker Swarm overlay networking, which is a much bigger lift than this needs. So scrap the npm_proxy network entirely and go back to plain host-port publishing — NPM reaches OTS the same way it reaches anything else off-host: over the LAN by IP or hostname.

What that means concretely:

    ots already publishes 8081:8081 to the host with no IP restriction, so it's already reachable from the other server at <this-host-ip>:8081. No change needed there.
    ots-webui currently has no ports: mapping at all — it was only relying on the (now scrapped) shared network. It needs an explicit host port published so the other machine can reach it. I don't know its internal listen port for certain, so check it once the container's running: docker port ots-webui or docker logs ots-webui (worth confirming rather than guessing wrong on something you'll be pointing a reverse proxy at).
    rabbitmq — only add a port mapping (1883:1883) if you actually want MQTT/Meshtastic reachable from NPM; skip it otherwise.
    Drop the whole networks: block at the bottom and the - npm_proxy lines under ots, ots-webui, and rabbitmq.

In NPM, the proxy host "Forward Hostname/IP" field changes from a container name (ots:8081) to this Docker host's actual LAN IP or its home.arpa DNS name if you've got an AdGuard entry for it — e.g. optiplex.home.arpa:8081 instead of ots:8081.

One more thing worth checking: whatever firewall is running on this host (ufw, firewalld, or Portainer host's default) needs to allow those ports in from the NPM server's IP specifically, since they're now genuinely LAN-exposed rather than container-internal.
